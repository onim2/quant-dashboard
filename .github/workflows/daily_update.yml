name: Daily Market Update

on:
  schedule:
    - cron: '0 7 * * 1-5' # 월~금 한국시간 오후 4시
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  update-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install libraries
        run: |
          pip install pandas sqlalchemy pymysql cryptography pykrx==1.0.45

      - name: Run Update Script
        env:
          DB_USER: ${{ secrets.YYY }}
          DB_PASSWORD: ${{ secrets.ROOT }}
        run: python update_db.py
