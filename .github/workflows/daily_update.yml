name: Daily Market Update

on:
  schedule:
    # 월~금 한국 시간 오후 4시 (UTC 07:00) 실행
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  update-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install libraries
        run: |
          pip install pandas sqlalchemy pymysql cryptography pykrx

      - name: Run Update Script
        env:
          # 금고 상자 이름을 사용자님의 설정(YYY, ROOT)에 완벽 매칭!
          DB_USER: ${{ secrets.YYY }}
          DB_PASSWORD: ${{ secrets.ROOT }}
        run: python update_db.py
